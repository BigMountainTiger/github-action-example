name: A04_environment_variables
env:
  # Global environment variables can be defineed here
  global_env: "This is a global environment variable"
  s3_bucket_name_template: "my-app-bucket-{env}"

on:
  workflow_dispatch:
    inputs:
      branch:
        type: choice
        description: "Git branch"
        required: true
        options:
          - develop
          - release
          - master
        default: master

jobs:
  echo_environment_variables:
    runs-on: ubuntu-latest
    env:
      ENV: >-
        ${{ 
          github.event.inputs.branch == 'develop' && 'dev' ||
          github.event.inputs.branch == 'release' && 'qa' ||
          github.event.inputs.branch == 'master' && 'prod'
        }}
    steps:
      - name: Set environment variables
        run: |
          branch=${{ github.event.inputs.branch }}
          echo "branch=$branch" >> $GITHUB_ENV

          variable_with_spaces="This variable has spaces"
          echo "variable_with_spaces=$variable_with_spaces" >> $GITHUB_ENV

          echo What is the \$GITHUB_ENV file content?
          echo $GITHUB_ENV
          cat $GITHUB_ENV

      - name: print the environment varisbles
        run: |
          echo $global_env
          echo $branch
          echo $ENV

      - name: Use the environment variable in step configuration
        uses: actions/checkout@v6
        with:
          ref: ${{ env.branch }}

      - run: git branch --show-current

      - name: Use template string to create environment variable
        run: |
          echo $s3_bucket_name_template

          echo duble slash replaces all occurrences of {env} with $ENV
          echo "S3 bucket name: ${s3_bucket_name_template//\{env\}/$ENV}"

          echo
          echo single slash replaces the first occurrence of {env} with $ENV
          echo "S3 bucket name: ${s3_bucket_name_template/\{env\}/$ENV}"